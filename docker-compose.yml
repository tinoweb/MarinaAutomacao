version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: marina_bot_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - marina_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marina_bot_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - MYSQL_PORT=3306
      - WHATSAPP_SESSION=${WHATSAPP_SESSION:-marina_bot_session}
    volumes:
      - whatsapp_sessions:/app/whatsapp_sessions
    depends_on:
      - db
    networks:
      - marina_network
    # O bot roda junto com o Flask na mesma aplicacao (thread)

volumes:
  db_data:
  whatsapp_sessions:

networks:
  marina_network:
    driver: bridge
