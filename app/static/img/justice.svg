<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Scales of Justice -->
  <g fill="#0d6efd">
    <!-- Base -->
    <rect x="225" y="400" width="50" height="20" rx="5" />
    <rect x="240" y="350" width="20" height="50" />
    
    <!-- Vertical Pole -->
    <rect x="245" y="150" width="10" height="200" />
    
    <!-- Top Horizontal Bar -->
    <rect x="145" y="150" width="210" height="10" />
    
    <!-- Left Scale -->
    <path d="M145,150 L195,250 L95,250 Z" fill="none" stroke="#0d6efd" stroke-width="5" />
    <circle cx="145" cy="270" r="30" fill="#f8f9fa" stroke="#0d6efd" stroke-width="5" />
    
    <!-- Right Scale -->
    <path d="M355,150 L405,250 L305,250 Z" fill="none" stroke="#0d6efd" stroke-width="5" />
    <circle cx="355" cy="270" r="30" fill="#f8f9fa" stroke="#0d6efd" stroke-width="5" />
    
    <!-- Decorative Elements -->
    <circle cx="250" cy="130" r="20" />
  </g>
  
  <!-- Decorative Legal Elements -->
  <g fill="#6c757d">
    <!-- Law Book Left -->
    <rect x="125" cy="270" width="40" height="10" rx="2" transform="translate(145, 270) rotate(10) translate(-145, -270)" />
    
    <!-- Law Book Right -->
    <rect x="335" cy="270" width="40" height="10" rx="2" transform="translate(355, 270) rotate(-10) translate(-355, -270)" />
  </g>
</svg>
