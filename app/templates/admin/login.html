<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AtendBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #7c3aed;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 16px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px 32px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 6px;
        }

        .login-logo .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
        }

        .login-logo span {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .login-subtitle {
            color: var(--muted);
            font-size: 0.88rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-label {
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .form-control {
            background-color: var(--bg) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 8px !important;
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15) !important;
        }

        .form-control::placeholder { color: var(--muted) !important; }

        .btn-login {
            background-color: var(--accent);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.92rem;
            padding: 11px;
            border-radius: 8px;
            width: 100%;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .btn-login:hover { background-color: #6d28d9; }

        .login-footer {
            text-align: center;
            margin-top: 20px;
        }

        .login-footer a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .login-footer a:hover { color: var(--text); }

        .copy {
            text-align: center;
            color: var(--muted);
            font-size: 0.78rem;
            margin-top: 20px;
        }

        .alert { border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; }
        .alert-danger   { background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.3); color: #f85149; }
        .alert-success  { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.3); color: #3fb950; }
        .btn-close { filter: invert(0.6) brightness(1.5); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <span class="brand-icon"><i class="fas fa-robot"></i></span>
                <span>AtendBot</span>
            </div>
            <p class="login-subtitle">Acesso ao Painel Administrativo</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin.login') }}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Digite seu usuário" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Digite sua senha" required>
                </div>
                <button class="btn-login" type="submit">
                    <i class="fas fa-right-to-bracket me-2"></i>Entrar
                </button>
            </form>

            <div class="login-footer">
                <a href="{{ url_for('main.index') }}">
                    <i class="fas fa-arrow-left me-1"></i>Voltar para o site
                </a>
            </div>
        </div>
        <p class="copy">&copy; 2026 AtendBot. Todos os direitos reservados.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
